whatIsQuantumTherapy: >-
  Quantum therapy is an alternative approach that draws on the principles of
  quantum physics. It treats body and mind as interconnected energy systems of
  varying density, and uses focused intention and centring to influence those
  systems to support balance and overall well-being.
whyTakeAsSession: >-
  It is an alternative modality offering a holistic approach to wellness, and
  can be used to address a wide range of physical and emotional concerns.
typicalSession: >-
  You make an appointment and provide details about your situation. The session
  includes a brief consultation with the therapist, the therapy itself in a
  relaxed state, and a short discussion to close.
howManySessions: >-
  This varies by individual need and the therapist's recommendation. Sessions
  are usually spaced a week or more apart, to allow time for integration between
  them.
howLong: >-
  One hour. The client is seated comfortably and the therapist works around the
  client's field. Charu's sessions are held online via a link provided before
  the appointment.
finally: >-
  Quantum therapy is soft, gentle, and non-invasive. It is intended to sit
  alongside, not replace, any ongoing treatment or advice from the client's own
  physician.
aboutCofounder: >-
  Ekta Bouderlique, founder of Quantum (R) Evolution, is a pioneer in
  developing quantum therapies. She is a Certified Yoga Trainer (Yoga Alliance
  USA) and a Heartfulness Meditation Trainer, and runs an NGO dedicated to
  sustainable development. Born in Gujarat, India, she lived for over two
  decades in France, working as a journalist and public relations consultant and
  in the participatory and sustainable economy.
